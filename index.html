<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EA Cloud — Masuk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
  <div class="auth-grid"></div>
  <main class="auth-card">
    <div class="brand">
      <span class="brand-mark">EA</span>
      <span class="brand-name">Cloud<strong>Dashboard</strong></span>
    </div>
    <p class="auth-sub">Kendalikan EA MT4/MT5 Anda dari mana saja.</p>

    <div class="tabs">
      <button class="tab active" data-tab="login">Masuk</button>
      <button class="tab" data-tab="register">Daftar</button>
    </div>

    <form id="loginForm" class="auth-form">
      <label>Email
        <input type="email" name="email" required placeholder="nama@email.com">
      </label>
      <label>Password
        <input type="password" name="password" required placeholder="••••••••">
      </label>
      <button type="submit" class="btn-primary">Masuk ke Dashboard</button>
      <p class="auth-error" id="loginError"></p>
    </form>

    <form id="registerForm" class="auth-form hidden">
      <label>Nama
        <input type="text" name="name" required placeholder="Nama lengkap">
      </label>
      <label>Email
        <input type="email" name="email" required placeholder="nama@email.com">
      </label>
      <label>Password
        <input type="password" name="password" required placeholder="Minimal 8 karakter">
      </label>
      <button type="submit" class="btn-primary">Buat Akun</button>
      <p class="auth-error" id="registerError"></p>
    </form>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
