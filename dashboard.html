<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EA Cloud Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">EA</span>
        <span class="brand-name">Cloud<strong>Dashboard</strong></span>
      </div>
      <nav class="side-nav">
        <a class="active" href="#">📊 Ringkasan</a>
        <a href="#" id="navAccounts">💹 Akun Trading</a>
        <a href="#" id="navLogout">🚪 Keluar</a>
      </nav>
      <div class="side-footer">
        <span class="dot dot-live"></span> Realtime via Redis
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>Ringkasan Akun</h1>
          <p class="muted">Data live dari EA — auto-refresh tiap 3 detik</p>
        </div>
        <button class="btn-primary" id="addAccountBtn">+ Hubungkan Akun</button>
      </header>

      <section class="stat-row" id="statRow">
        <!-- filled by JS -->
      </section>

      <section class="cards" id="accountCards">
        <!-- account cards injected here -->
      </section>

      <section class="panel hidden" id="detailPanel">
        <div class="panel-head">
          <h2 id="detailTitle">Detail Akun</h2>
          <button class="btn-ghost" id="closeDetail">Tutup ✕</button>
        </div>

        <div class="panel-grid">
          <div class="panel-block">
            <h3>Kontrol Cepat</h3>
            <div class="btn-row">
              <button class="btn-ok" data-cmd="start">▶ Start</button>
              <button class="btn-warn" data-cmd="pause">⏸ Pause</button>
              <button class="btn-danger" data-cmd="stop">⏹ Stop</button>
              <button class="btn-danger-outline" data-cmd="emergency_stop">🛑 Emergency Stop</button>
            </div>
            <div class="btn-row">
              <button class="btn-ghost" data-cmd="close_buy">Close BUY</button>
              <button class="btn-ghost" data-cmd="close_sell">Close SELL</button>
              <button class="btn-ghost" data-cmd="close_all">Close All</button>
            </div>
            <div class="btn-row">
              <button class="btn-ghost" data-cmd="disable_averaging">Disable Averaging</button>
              <button class="btn-ghost" data-cmd="disable_grid">Disable Grid</button>
              <button class="btn-ghost" data-cmd="disable_hedging">Disable Hedging</button>
              <button class="btn-ghost" data-cmd="enable_news_filter">Enable News Filter</button>
            </div>
          </div>

          <div class="panel-block">
            <h3>Pengaturan EA</h3>
            <form id="settingsForm" class="settings-form">
              <label>Lots <input type="number" step="0.01" name="lots"></label>
              <label>Grid Step (poin) <input type="number" name="grid_step"></label>
              <label>Take Profit (poin) <input type="number" name="take_profit"></label>
              <label>Stop Loss (poin) <input type="number" name="stop_loss"></label>
              <label>Magic Number <input type="number" name="magic_number"></label>
              <label>Max Positions <input type="number" name="max_positions"></label>
              <button type="submit" class="btn-primary">Simpan Pengaturan</button>
              <p class="save-note" id="saveNote"></p>
            </form>
          </div>
        </div>

        <div class="panel-block">
          <h3>Profit 30 Hari Terakhir</h3>
          <canvas id="profitChart" height="90"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
